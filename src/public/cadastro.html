<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaúdePlan - Painel de Controle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
        <div class="logo">🧪 SaúdePlan Lab</div>
        <div class="nav-links">
            <a href="cadastro.html" class="active">Usuários</a>
            <a href="pacientes.html">Pacientes</a> <a href="javascript:void(0);" id="btnSair" class="btn btn-sair" onclick="deslogar()">Sair</a>
        </div>
</nav>
<div class="container">
    <div class="page-header">
            <h1 id="formTitulo">Gerenciamento de Usuários</h1>
    </div>
    <div class="main-card">
    <form id="formUsuario" class="form-inline">
        <input type="hidden" id="usuarioId"> 
        <div class="form-row">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: Dr. Carlos Silva" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="carlos@saudeplan.com" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="senha">Senha de Acesso</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres">
            </div>
        </div>
            <div class="form-group">
                <label for="perfil">Perfil de Acesso</label>
                <select id="perfil">
                    <option value="tecnico">Técnico</option>
                    <option value="biomedico">Biomédico</option>
                    <option value="farmaceutico">Farmacêutico</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button type="submit" id="btnSalvar" class="btn btn-success">Salvar Usuário</button>
            <button type="button" id="btnCancelar" class="btn" style="background-color: #64748b; color: white; display: none;" onclick="resetarFormulario()">Cancelar</button>
        </div>
    </form>

    <div class="page-header">
        <h2>Profissionais Cadastrados</h2>
    </div>
    <div class="main-card" style="padding: 0;">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Perfil</th>
                        <th style="text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaUsuarios">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/main.js"></script>

</html>

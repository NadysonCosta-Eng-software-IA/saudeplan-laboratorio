<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaúdePlan - login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h2>🩸 SaúdePlan</h2>
        <p>Laboratório de Análises Clínicas</p>
        <form id="formLogin">
            <div class="form-group">
                <label>E-mail:</label>
                <input type="email" id="loginEmail" required placeholder="nome@saudeplan.com">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="loginSenha" required placeholder="******">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Entrar</button>
        </form>
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
